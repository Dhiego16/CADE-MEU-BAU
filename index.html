    <!-- PWA / App Mode -->
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />

    <link rel="icon" type="image/png" href="./logo.png" />
    <link rel="apple-touch-icon" href="./logo.png" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
      :root {
        --yellow: #fbbf24;
      }
      body { 
        font-family: 'Inter', sans-serif; 
        margin: 0; 
        background: black; 
        color: white; 
        -webkit-user-select: none; /* Bloqueia seleção de texto para parecer app */
        user-select: none;
        overflow: hidden; /* O scroll será controlado internamente */
        height: 100vh;
        width: 100vw;
      }

      /* Scroll customizado para o container interno */
      .app-container {
        height: 100vh;
        overflow-y: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 100px; /* Espaço para o bottom nav */
      }

      /* Animações de App */
      .page-enter {
        animation: slideUp 0.3s ease-out forwards;
      }
      @keyframes slideUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      /* Efeito de clique nativo */
      .btn-active:active {
        transform: scale(0.95);
        opacity: 0.8;
      }

      /* Esconder barra de rolagem */
      ::-webkit-scrollbar { display: none; }
    </style>
